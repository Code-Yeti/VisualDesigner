server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    types {
        application/wasm wasm;
    }

    gzip on;
    gzip_types text/css application/javascript application/wasm application/json image/svg+xml;

    location / {
        try_files $uri $uri/ /index.html;
    }
}
